<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="img-src * data: 'unsafe-eval' 'unsafe-inline';">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>QuantumBot · Microcontroller Assistant</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #111118;
      --surface2: #1a1a26;
      --border: #2a2a3d;
      --accent: #2596be;
      --accent2: #2ea9d6;
      --text: #e8e8f0;
      --muted: #6b6b8a;
    }

    body {
      font-family: 'Syne', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(37,150,190,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(37,150,190,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    body::after {
      content: '';
      position: fixed;
      top: -200px; right: -200px;
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(37,150,190,0.12) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
      animation: orbFloat 8s ease-in-out infinite;
    }

    @keyframes orbFloat {
      0%, 100% { transform: translate(0,0); }
      50% { transform: translate(-30px, 30px); }
    }

    header {
      position: relative;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      background: rgba(10,10,15,0.8);
      backdrop-filter: blur(20px);
    }

    .logo { display: flex; align-items: center; gap: 10px; }

    .logo-icon {
      width: 40px; height: 40px;  /* ← ukuran logo di navbar chat */
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .logo-icon img { width: 100%; height: 100%; object-fit: contain; display: block; }

    .logo-text { font-size: 18px; font-weight: 800; letter-spacing: -0.5px; }
    .logo-text span { color: var(--accent); text-shadow: 0 0 8px rgba(37, 150, 190, 0.8); }

    .model-badge {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      padding: 4px 10px;
      border: 1px solid var(--border);
      border-radius: 20px;
      color: var(--muted);
      background: var(--surface);
    }

    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #4ade80;
      box-shadow: 0 0 6px #4ade80;
      animation: blink 2s infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    #chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      position: relative;
      z-index: 1;
      background: rgba(10, 10, 15, 0.8);
    }

    #chat-area::-webkit-scrollbar { width: 4px; }
    #chat-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    #welcome {
      flex: 1;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center;
      gap: 16px; padding: 40px;
      animation: fadeIn 0.6s ease;
      position: relative; z-index: 10;
    }

    .welcome-orb {
      width: 100px; height: 100px;  /* ← ukuran logo di welcome screen chat */
      display: flex; align-items: center; justify-content: center;
      animation: pulse 3s ease-in-out infinite;
      background: transparent !important;
      background-color: transparent !important;
      border: none !important;
      box-shadow: none !important;
    }
    .welcome-orb img {
      width: 100%; height: 100%; object-fit: contain; display: block;
      background: transparent !important;
      background-color: transparent !important;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 40px rgba(37,150,190,0.3); }
      50% { box-shadow: 0 0 60px rgba(37,150,190,0.5); }
    }

    #welcome h1 { font-size: 28px; font-weight: 800; color: #2596be; text-shadow: 0 0 8px rgba(37, 150, 190, 0.8); }
    #welcome p { color: var(--muted); font-size: 15px; max-width: 320px; line-height: 1.6; }

    .suggestions {
      display: flex; flex-wrap: wrap;
      gap: 8px; justify-content: center;
      margin-top: 8px;
    }

    .suggestion-chip {
      padding: 8px 16px;
      border: 1px solid var(--border);
      border-radius: 20px;
      font-size: 13px;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.2s;
      background: var(--surface);
      position: relative; z-index: 10;
    }

    .suggestion-chip:hover {
      border-color: var(--accent);
      color: var(--text);
      background: var(--surface2);
    }

    .message {
      display: flex; gap: 12px;
      max-width: 780px; width: 100%;
      animation: slideUp 0.3s ease;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message.user { flex-direction: row-reverse; align-self: flex-end; }
    .message.ai { align-self: flex-start; }

    .avatar {
      width: 34px; height: 34px;
      border-radius: 10px;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 700;
    }

    .message.user .avatar {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--accent);
    }

    .message.ai .avatar {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      font-size: 16px;
    }

    .bubble {
      padding: 12px 16px;
      border-radius: 14px;
      font-size: 14.5px;
      line-height: 1.7;
      max-width: calc(100% - 50px);
      word-break: break-word;
    }

    .message.user .bubble {
      background: #1e1e35;
      border: 1px solid var(--border);
      border-top-right-radius: 4px;
    }

    .message.ai .bubble {
      background: #161621;
      border: 1px solid var(--border);
      border-top-left-radius: 4px;
    }

    .bubble code {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12.5px;
      background: rgba(37,150,190,0.1);
      padding: 2px 6px;
      border-radius: 4px;
      color: var(--accent);
    }

    .bubble pre {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px;
      overflow-x: auto;
      margin: 8px 0;
    }

    .bubble pre code {
      background: none; padding: 0;
      color: #a8d8b0;
    }

    .bubble img {
      max-width: 100%;
      border-radius: 10px;
      margin: 8px 0;
      border: 1px solid var(--border);
      display: block;
    }

    .bubble a {
      color: var(--accent);
      text-decoration: underline;
    }

    .bubble a:hover {
      color: var(--accent2);
    }

    .typing-dots {
      display: flex; gap: 5px;
      padding: 14px 16px; align-items: center;
    }

    .typing-dots span {
      width: 7px; height: 7px;
      background: var(--accent);
      border-radius: 50%;
      animation: bounce 1.2s ease-in-out infinite;
    }

    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
      40% { transform: translateY(-6px); opacity: 1; }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    #input-area {
      position: relative; z-index: 10;
      padding: 16px 24px 20px;
      border-top: 1px solid var(--border);
      background: rgba(10,10,15,0.8);
      backdrop-filter: blur(20px);
    }

    .input-wrapper {
      display: flex; align-items: flex-end; gap: 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 10px 10px 10px 16px;
      transition: border-color 0.2s;
    }

    .input-wrapper:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(37,150,190,0.1);
    }

    #user-input {
      flex: 1;
      background: none; border: none; outline: none;
      color: var(--text);
      font-family: 'Syne', sans-serif;
      font-size: 14.5px;
      resize: none;
      max-height: 160px;
      line-height: 1.6;
      padding: 4px 0;
    }

    #user-input::placeholder { color: var(--muted); }

    #send-btn {
      width: 40px; height: 40px;
      border-radius: 10px;
      background: #2596be;
      border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: background-color 0.2s, box-shadow 0.2s, transform 0.1s;
    }

    #send-btn:hover { background-color: #2ea9d6; box-shadow: 0 0 8px #2596be; transform: scale(1.05); }
    #send-btn:active { transform: scale(0.95); }
    #send-btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none; box-shadow: none; }
    #send-btn svg { width: 18px; height: 18px; fill: white; }

    .input-footer {
      display: flex; align-items: center;
      justify-content: space-between;
      margin-top: 8px; padding: 0 4px;
    }

    .input-footer span { font-size: 11px; color: var(--muted); }

    #clear-btn {
      font-size: 11px; color: var(--muted);
      background: none; border: none;
      cursor: pointer;
      font-family: 'Syne', sans-serif;
      transition: color 0.2s;
    }

    #clear-btn:hover { color: var(--accent2); }

    #error-toast {
      position: fixed;
      bottom: 100px; left: 50%;
      transform: translateX(-50%);
      background: #2a1020;
      border: 1px solid #ff4d6d;
      color: #ff4d6d;
      padding: 10px 20px;
      border-radius: 10px;
      font-size: 13px;
      z-index: 200;
      display: none;
      max-width: 90vw;
      text-align: center;
    }

    @media (max-width: 600px) {
      header { padding: 12px 16px; }
      #chat-area { padding: 16px; }
      #input-area { padding: 12px 16px 16px; }
    }
  </style>
</head>

<div id="chat-area">
  <div id="welcome">
    <div class="welcome-orb"><img src="/logobaru.png" alt="QuantumBot" style="mix-blend-mode: lighten; width: 100%; object-fit: contain;"></div>
    <h1>Halo! Saya QuantumBot</h1>
    <p>Asisten khusus microcontroller. Tanya seputar Arduino, ESP32, sensor, dan elektronika!</p>
    <div class="suggestions">
      <div class="suggestion-chip" data-text="Cara blink LED dengan Arduino" onclick="sendSuggestion(this.dataset.text)">💡 Blink LED Arduino</div>
      <div class="suggestion-chip" data-text="Tampilkan pinout Arduino Uno" onclick="sendSuggestion(this.dataset.text)">📌 Pinout Arduino</div>
      <div class="suggestion-chip" data-text="Cara koneksi ESP32 ke WiFi" onclick="sendSuggestion(this.dataset.text)">📶 ESP32 WiFi</div>
      <div class="suggestion-chip" data-text="Cara pakai sensor DHT22 dengan Arduino" onclick="sendSuggestion(this.dataset.text)">🌡️ Sensor DHT22</div>
    </div>
  </div>
</div>

    </button>
  </div>

  </div>
</div>

<script>
  // ── Auth guard: redirect ke login jika sesi tidak valid / kelas ditutup ──────
  async function checkAccess() {
    try {
      const r = await fetch('/api/me');
      if (r.status === 401) {
        window.location.replace('/login.html');
        return;
      }
      if (r.status === 403) {
        // Kelas dinonaktifkan oleh dosen — tampilkan notif lalu redirect
        showError('Akses kelas ditutup oleh Dosen. Kamu akan dialihkan ke halaman login…');
        setTimeout(() => window.location.replace('/login.html'), 2500);
      }
    } catch { window.location.replace('/login.html'); }
  }

  checkAccess();
  // Poll setiap 6 detik — kalau kelas dinonaktifkan, langsung redirect
  setInterval(checkAccess, 6000);

  // ── Heartbeat: beri tahu server bahwa user masih aktif setiap 30 detik ───────
  function sendHeartbeat() {
    fetch('/api/heartbeat', { method: 'POST' }).catch(() => {});
  }
  sendHeartbeat();
  setInterval(sendHeartbeat, 30000);

  // ── Beacon: otomatis logout dari activeSessions saat tab/browser ditutup ─────
  window.addEventListener('pagehide', () => {
    navigator.sendBeacon('/api/beacon');
  });

  let messages = [];
  let isLoading = false;
  let welcomeData = null; // cache config welcome

  // ── Load welcome screen dinamis ───────────────────────────────────────────────
  async function loadWelcome() {
    try {
      const res = await fetch('/api/welcome');
      if (res.ok) {
        welcomeData = await res.json();
        if (welcomeData.driveLink && welcomeData.driveLink.trim()) {
          const btn = document.getElementById('downloadBtn');
          btn.href = welcomeData.driveLink.trim();
          btn.style.display = 'inline-flex';
        }
      }
    } catch (_) {}
    renderWelcome();
  }

  function renderWelcome() {
    const d = welcomeData || {};
    const title = d.welcomeTitle || 'Halo! Saya QuantumBot';
    const desc  = d.welcomeDesc  || 'Asisten khusus microcontroller. Tanya seputar Arduino, ESP32, sensor, dan elektronika!';
    const sugs  = (d.suggestions && d.suggestions.length)
      ? d.suggestions
      : ['Cara blink LED dengan Arduino', 'Tampilkan pinout Arduino Uno', 'Cara koneksi ESP32 ke WiFi', 'Cara pakai sensor DHT22 dengan Arduino'];

    const chipsHtml = sugs.map(s =>
      `<div class="suggestion-chip" data-text="${s.replace(/&/g,'&amp;').replace(/"/g,'&quot;')}" onclick="sendSuggestion(this.dataset.text)">${s}</div>`
    ).join('');

    const el = document.getElementById('welcome');
    if (el) {
      el.querySelector('h1').textContent = title;
      el.querySelector('p').textContent  = desc;
      el.querySelector('.suggestions').innerHTML = chipsHtml;
    }
  }

  loadWelcome();

  document.getElementById('btnLogout').addEventListener('click', async () => {
    try { await fetch('/api/logout', { method: 'POST' }); } finally {
      window.location.href = '/login.html';
    }
  });

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 160) + 'px';
  }

  function sendSuggestion(text) {
    document.getElementById('user-input').value = text;
    sendMessage();
  }

  async function sendMessage() {
    const input = document.getElementById('user-input');
    const text = input.value.trim();
    if (!text || isLoading) return;

    const welcome = document.getElementById('welcome');
    if (welcome) welcome.remove();

    messages.push({ role: 'user', content: text });
    appendMessage('user', text);
    input.value = '';
    input.style.height = 'auto';

    const typingEl = appendTyping();
    isLoading = true;
    document.getElementById('send-btn').disabled = true;

    try {
      const response = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages })
      });

      const data = await response.json();

      if (data.error) throw new Error(data.error);

      const reply = data.choices[0].message.content;
      messages.push({ role: 'assistant', content: reply });
      typingEl.remove();
      appendMessage('ai', reply);

    } catch (err) {
      typingEl.remove();
      showError('❌ Error: ' + err.message);
    } finally {
      isLoading = false;
      document.getElementById('send-btn').disabled = false;
    }
  }

  function appendMessage(role, text) {
    const chat = document.getElementById('chat-area');
    const div = document.createElement('div');
    div.className = `message ${role}`;

    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = role === 'user' ? '👤' : '⚡';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';

    // Render konten dulu ke bubble
    bubble.innerHTML = formatMessage(text);

    // ✅ FIX: Play audio sekali jika ada gambar di pesan AI
    if (role === 'ai' && bubble.querySelector('img')) {
      const sfx = document.getElementById('img-sfx');
      sfx.currentTime = 0;
      sfx.play().catch(() => {
        // Browser blokir autoplay sebelum interaksi user — diabaikan
      });
    }

    div.appendChild(avatar);
    div.appendChild(bubble);
    chat.appendChild(div);
    scrollToBottom();
    return div;
  }

  function appendTyping() {
    const chat = document.getElementById('chat-area');
    const div = document.createElement('div');
    div.className = 'message ai';

    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = '⚡';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.innerHTML = `<div class="typing-dots"><span></span><span></span><span></span></div>`;

    div.appendChild(avatar);
    div.appendChild(bubble);
    chat.appendChild(div);
    scrollToBottom();
    return div;
  }

  function formatMessage(text) {
    // ✅ FIX 1: Render gambar markdown dulu (Tanpa onerror yang bikin bug)
    text = text.replace(/!\[([^\]]*)\]\((.*?)\)/g,
      '<img src="$2" alt="$1" referrerpolicy="no-referrer" style="max-width:100%;border-radius:10px;margin:8px 0;border:1px solid var(--border);display:block;">');

    // Render link markdown [text](url)
    text = text.replace(/\[([^\]]+)\]\((.*?)\)/g,
      '<a href="$2" target="_blank" rel="noopener">$1</a>');

    // Code blocks
    text = text.replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) => {
      return `<pre><code>${escapeHtml(code.trim())}</code></pre>`;
    });

    // Inline code
    text = text.replace(/`([^`]+)`/g, '<code>$1</code>');

    // Bold
    text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');

    // ✅ FIX 2: Negative lookbehind — jangan ubah URL yang sudah ada di dalam atribut src/href
    text = text.replace(/(?<![="'])(https?:\/\/[^\s<"']+)/g,
      '<a href="$1" target="_blank" rel="noopener">$1</a>');

    // Line breaks
    text = text.replace(/\n/g, '<br>');

    return text;
  }

  function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function scrollToBottom() {
    const chat = document.getElementById('chat-area');
    chat.scrollTop = chat.scrollHeight;
  }

  function clearChat() {
    if (messages.length === 0) return;
    if (!confirm('Hapus semua percakapan?')) return;
    messages = [];
    isLoading = false;
    document.getElementById('send-btn').disabled = false;
    const chat = document.getElementById('chat-area');
    chat.innerHTML = `
      <div id="welcome">
        <div class="welcome-orb"><img src="/logobaru.png" alt="QuantumBot" style="mix-blend-mode: lighten; width: 100%; object-fit: contain;"></div>
        <h1></h1>
        <p></p>
        <div class="suggestions"></div>
      </div>`;
    renderWelcome();
  }

  function showError(msg) {
    const toast = document.getElementById('error-toast');
    toast.textContent = msg;
    toast.style.display = 'block';
    setTimeout(() => { toast.style.display = 'none'; }, 5000);
  }

  let _audioUnlocked = false;

  // Unlock audio pada interaksi pertama user (klik / ketik / sentuh)
  function _unlockAudio() {
    if (_audioUnlocked) return;
    _soundAudio.play().then(() => {
      _soundAudio.pause();
      _soundAudio.currentTime = 0;
      _audioUnlocked = true;
    }).catch(() => {});
  }
  document.addEventListener('click',      _unlockAudio);
  document.addEventListener('keydown',    _unlockAudio);
  document.addEventListener('touchstart', _unlockAudio);

  function playBeep() {
    _soundAudio.currentTime = 0;
    _soundAudio.play().catch(err => console.warn('playBeep error:', err));
  }

  (function connectSoundSSE() {
    const es = new EventSource('/api/sound-events');
    es.onmessage = e => { if (e.data === 'play') playBeep(); };
    es.onerror = () => {
      es.close();
      setTimeout(connectSoundSSE, 5000);
    };
  })();

<script>
  // ── Tron Digital Comets Animation ────────────────────────────────────────
  (function() {
    const canvas = document.getElementById('tron-bg');
    const ctx    = canvas.getContext('2d');

    const CELL       = 30;          // grid cell size in px
    const TRON_COLOR = '#2596be';
    const COMET_COUNT = 18;
    const FADE_RATE   = 0.04;       // how fast lit cells fade per frame

    let W, H, cols, rows;
    let cells  = [];   // 2D array of alpha values [0..1]
    let comets = [];

    // Directions: right, down, left, up
    const DIRS = [
      { dx: 1, dy: 0 },
      { dx: 0, dy: 1 },
      { dx: -1, dy: 0 },
      { dx: 0, dy: -1 },
    ];

    function resize() {
      W = canvas.width  = window.innerWidth;
      H = canvas.height = window.innerHeight;
      cols  = Math.ceil(W / CELL) + 1;
      rows  = Math.ceil(H / CELL) + 1;
      cells = Array.from({ length: rows }, () => new Float32Array(cols));
      comets = Array.from({ length: COMET_COUNT }, spawnComet);
    }

    function spawnComet() {
      const dir = DIRS[Math.floor(Math.random() * DIRS.length)];
      let col, row;
      if (dir.dx === 1)  { col = 0;        row = Math.floor(Math.random() * rows); }
      else if (dir.dx === -1) { col = cols - 1; row = Math.floor(Math.random() * rows); }
      else if (dir.dy === 1)  { col = Math.floor(Math.random() * cols); row = 0; }
      else                    { col = Math.floor(Math.random() * cols); row = rows - 1; }
      return {
        col: col + 0.0, row: row + 0.0,
        dir,
        speed: 0.06 + Math.random() * 0.10,
        // fractional progress along current cell
      };
    }

    function draw() {
      ctx.clearRect(0, 0, W, H);

      // ── 1. Draw static dim grid ──────────────────────────────────────────
      ctx.strokeStyle = 'rgba(37,150,190,0.07)';
      ctx.lineWidth   = 1;
      ctx.shadowBlur  = 0;
      for (let c = 0; c <= cols; c++) {
        ctx.beginPath();
        ctx.moveTo(c * CELL, 0);
        ctx.lineTo(c * CELL, H);
        ctx.stroke();
      }
      for (let r = 0; r <= rows; r++) {
        ctx.beginPath();
        ctx.moveTo(0, r * CELL);
        ctx.lineTo(W, r * CELL);
        ctx.stroke();
      }

      // ── 2. Draw lit & fading cells ───────────────────────────────────────
      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          const a = cells[r][c];
          if (a < 0.01) continue;
          ctx.fillStyle = `rgba(37,150,190,${a.toFixed(3)})`;
          ctx.shadowBlur  = 8;
          ctx.shadowColor = TRON_COLOR;
          ctx.fillRect(c * CELL + 1, r * CELL + 1, CELL - 2, CELL - 2);
          cells[r][c] = Math.max(0, a - FADE_RATE);
        }
      }

      // ── 3. Move comets & light cells ─────────────────────────────────────
      ctx.shadowBlur  = 14;
      ctx.shadowColor = TRON_COLOR;
      for (let i = 0; i < comets.length; i++) {
        const cm = comets[i];
        cm.col += cm.dir.dx * cm.speed;
        cm.row += cm.dir.dy * cm.speed;

        const gc = Math.floor(cm.col);
        const gr = Math.floor(cm.row);

        // Light current cell fully
        if (gr >= 0 && gr < rows && gc >= 0 && gc < cols) {
          cells[gr][gc] = 1.0;
          // Bright comet head
          ctx.fillStyle = '#ffffff';
          ctx.fillRect(gc * CELL + 3, gr * CELL + 3, CELL - 6, CELL - 6);
        }

        // Respawn if out of bounds
        if (cm.col < -1 || cm.col > cols + 1 || cm.row < -1 || cm.row > rows + 1) {
          comets[i] = spawnComet();
          // Occasionally change direction mid-journey (on grid nodes)
          if (Math.random() < 0.3) {
            comets[i].dir = DIRS[Math.floor(Math.random() * DIRS.length)];
          }
        }
      }

      requestAnimationFrame(draw);
    }

    window.addEventListener('resize', resize);
    resize();
    draw();
  })();
</script>
