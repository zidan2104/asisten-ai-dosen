<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ZidanBot · Microcontroller Assistant</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #111118;
      --surface2: #1a1a26;
      --border: #2a2a3d;
      --accent: #7c6bff;
      --accent2: #ff6b9d;
      --text: #e8e8f0;
      --muted: #6b6b8a;
    }

    body {
      font-family: 'Syne', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(124,107,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(124,107,255,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    body::after {
      content: '';
      position: fixed;
      top: -200px; right: -200px;
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(124,107,255,0.12) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
      animation: orbFloat 8s ease-in-out infinite;
    }

    @keyframes orbFloat {
      0%, 100% { transform: translate(0,0); }
      50% { transform: translate(-30px, 30px); }
    }

    header {
      position: relative;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      background: rgba(10,10,15,0.8);
      backdrop-filter: blur(20px);
    }

    .logo { display: flex; align-items: center; gap: 10px; }

    .logo-icon {
      width: 36px; height: 36px;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
      box-shadow: 0 0 20px rgba(124,107,255,0.4);
    }

    .logo-text { font-size: 18px; font-weight: 800; letter-spacing: -0.5px; }
    .logo-text span { color: var(--accent); }

    .model-badge {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      padding: 4px 10px;
      border: 1px solid var(--border);
      border-radius: 20px;
      color: var(--muted);
      background: var(--surface);
    }

    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #4ade80;
      box-shadow: 0 0 6px #4ade80;
      animation: blink 2s infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    #chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      position: relative;
      z-index: 1;
    }

    #chat-area::-webkit-scrollbar { width: 4px; }
    #chat-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    #welcome {
      flex: 1;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center;
      gap: 16px; padding: 40px;
      animation: fadeIn 0.6s ease;
    }

    .welcome-orb {
      width: 80px; height: 80px;
      border-radius: 24px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex; align-items: center; justify-content: center;
      font-size: 36px;
      box-shadow: 0 0 40px rgba(124,107,255,0.3);
      animation: pulse 3s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 40px rgba(124,107,255,0.3); }
      50% { box-shadow: 0 0 60px rgba(124,107,255,0.5); }
    }

    #welcome h1 { font-size: 28px; font-weight: 800; }
    #welcome p { color: var(--muted); font-size: 15px; max-width: 320px; line-height: 1.6; }

    .suggestions {
      display: flex; flex-wrap: wrap;
      gap: 8px; justify-content: center;
      margin-top: 8px;
    }

    .suggestion-chip {
      padding: 8px 16px;
      border: 1px solid var(--border);
      border-radius: 20px;
      font-size: 13px;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.2s;
      background: var(--surface);
    }

    .suggestion-chip:hover {
      border-color: var(--accent);
      color: var(--text);
      background: var(--surface2);
    }

    .message {
      display: flex; gap: 12px;
      max-width: 780px; width: 100%;
      animation: slideUp 0.3s ease;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message.user { flex-direction: row-reverse; align-self: flex-end; }
    .message.ai { align-self: flex-start; }

    .avatar {
      width: 34px; height: 34px;
      border-radius: 10px;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 700;
    }

    .message.user .avatar {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--accent);
    }

    .message.ai .avatar {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      font-size: 16px;
    }

    .bubble {
      padding: 12px 16px;
      border-radius: 14px;
      font-size: 14.5px;
      line-height: 1.7;
      max-width: calc(100% - 50px);
      word-break: break-word;
    }

    .message.user .bubble {
      background: #1e1e35;
      border: 1px solid var(--border);
      border-top-right-radius: 4px;
    }

    .message.ai .bubble {
      background: #161621;
      border: 1px solid var(--border);
      border-top-left-radius: 4px;
    }

    .bubble code {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12.5px;
      background: rgba(124,107,255,0.1);
      padding: 2px 6px;
      border-radius: 4px;
      color: var(--accent);
    }

    .bubble pre {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px;
      overflow-x: auto;
      margin: 8px 0;
    }

    .bubble pre code {
      background: none; padding: 0;
      color: #a8d8b0;
    }

    .bubble img {
      max-width: 100%;
      border-radius: 10px;
      margin: 8px 0;
      border: 1px solid var(--border);
      display: block;
    }

    .bubble a {
      color: var(--accent);
      text-decoration: underline;
    }

    .bubble a:hover {
      color: var(--accent2);
    }

    .typing-dots {
      display: flex; gap: 5px;
      padding: 14px 16px; align-items: center;
    }

    .typing-dots span {
      width: 7px; height: 7px;
      background: var(--accent);
      border-radius: 50%;
      animation: bounce 1.2s ease-in-out infinite;
    }

    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
      40% { transform: translateY(-6px); opacity: 1; }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    #input-area {
      position: relative; z-index: 10;
      padding: 16px 24px 20px;
      border-top: 1px solid var(--border);
      background: rgba(10,10,15,0.8);
      backdrop-filter: blur(20px);
    }

    .input-wrapper {
      display: flex; align-items: flex-end; gap: 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 10px 10px 10px 16px;
      transition: border-color 0.2s;
    }

    .input-wrapper:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(124,107,255,0.1);
    }

    #user-input {
      flex: 1;
      background: none; border: none; outline: none;
      color: var(--text);
      font-family: 'Syne', sans-serif;
      font-size: 14.5px;
      resize: none;
      max-height: 160px;
      line-height: 1.6;
      padding: 4px 0;
    }

    #user-input::placeholder { color: var(--muted); }

    #send-btn {
      width: 40px; height: 40px;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: opacity 0.2s, transform 0.1s;
    }

    #send-btn:hover { opacity: 0.85; transform: scale(1.05); }
    #send-btn:active { transform: scale(0.95); }
    #send-btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }
    #send-btn svg { width: 18px; height: 18px; fill: white; }

    .input-footer {
      display: flex; align-items: center;
      justify-content: space-between;
      margin-top: 8px; padding: 0 4px;
    }

    .input-footer span { font-size: 11px; color: var(--muted); }

    #clear-btn {
      font-size: 11px; color: var(--muted);
      background: none; border: none;
      cursor: pointer;
      font-family: 'Syne', sans-serif;
      transition: color 0.2s;
    }

    #clear-btn:hover { color: var(--accent2); }

    #error-toast {
      position: fixed;
      bottom: 100px; left: 50%;
      transform: translateX(-50%);
      background: #2a1020;
      border: 1px solid #ff4d6d;
      color: #ff4d6d;
      padding: 10px 20px;
      border-radius: 10px;
      font-size: 13px;
      z-index: 200;
      display: none;
      max-width: 90vw;
      text-align: center;
    }

    @media (max-width: 600px) {
      header { padding: 12px 16px; }
      #chat-area { padding: 16px; }
      #input-area { padding: 12px 16px 16px; }
    }
  </style>
</head>

<header>
  <div class="logo">
    <div class="logo-icon">⚡</div>
    <div class="logo-text">Zidan<span>Bot</span></div>
  </div>
  <div style="display:flex;align-items:center;gap:10px;">
    <div class="status-dot" title="Server aktif"></div>
    <span class="model-badge">Microcontroller AI</span>
    <button onclick="clearChat()" style="font-size:11px;color:var(--muted);background:none;border:1px solid var(--border);border-radius:6px;padding:4px 10px;cursor:pointer;font-family:'Syne',sans-serif;">🗑 Reset</button>
  </div>
</header>

<div id="chat-area">
  <div id="welcome">
    <div class="welcome-orb">⚡</div>
    <h1>Halo! Saya ZidanBot</h1>
    <p>Asisten khusus microcontroller. Tanya seputar Arduino, ESP32, sensor, dan elektronika!</p>
    <div class="suggestions">
      <div class="suggestion-chip" onclick="sendSuggestion('Cara blink LED dengan Arduino')">💡 Blink LED Arduino</div>
      <div class="suggestion-chip" onclick="sendSuggestion('Tampilkan pinout Arduino Uno')">📌 Pinout Arduino</div>
      <div class="suggestion-chip" onclick="sendSuggestion('Cara koneksi ESP32 ke WiFi')">📶 ESP32 WiFi</div>
      <div class="suggestion-chip" onclick="sendSuggestion('Cara pakai sensor DHT22 dengan Arduino')">🌡️ Sensor DHT22</div>
    </div>
  </div>
</div>

<div id="input-area">
  <div class="input-wrapper">
    <textarea id="user-input" rows="1" placeholder="Tanya seputar microcontroller..." onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button id="send-btn" onclick="sendMessage()" title="Kirim">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
  <div class="input-footer">
    <span>Enter kirim · Shift+Enter baris baru</span>
    <button id="clear-btn" onclick="clearChat()">🗑 Hapus percakapan</button>
  </div>
</div>

<div id="error-toast"></div>

<script>
  let messages = [];
  let isLoading = false;

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 160) + 'px';
  }

  function sendSuggestion(text) {
    document.getElementById('user-input').value = text;
    sendMessage();
  }

  async function sendMessage() {
    const input = document.getElementById('user-input');
    const text = input.value.trim();
    if (!text || isLoading) return;

    const welcome = document.getElementById('welcome');
    if (welcome) welcome.remove();

    messages.push({ role: 'user', content: text });
    appendMessage('user', text);
    input.value = '';
    input.style.height = 'auto';

    const typingEl = appendTyping();
    isLoading = true;
    document.getElementById('send-btn').disabled = true;

    try {
      const response = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages })
      });

      const data = await response.json();

      if (data.error) throw new Error(data.error);

      const reply = data.choices[0].message.content;
      messages.push({ role: 'assistant', content: reply });
      typingEl.remove();
      appendMessage('ai', reply);

    } catch (err) {
      typingEl.remove();
      showError('❌ Error: ' + err.message);
    } finally {
      isLoading = false;
      document.getElementById('send-btn').disabled = false;
    }
  }

  function appendMessage(role, text) {
    const chat = document.getElementById('chat-area');
    const div = document.createElement('div');
    div.className = `message ${role}`;

    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = role === 'user' ? '👤' : '⚡';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';

    // Render konten dulu ke bubble
    bubble.innerHTML = formatMessage(text);

    // ✅ FIX: Play audio sekali jika ada gambar di pesan AI
    if (role === 'ai' && bubble.querySelector('img')) {
      const sfx = document.getElementById('img-sfx');
      sfx.currentTime = 0;
      sfx.play().catch(() => {
        // Browser blokir autoplay sebelum interaksi user — diabaikan
      });
    }

    div.appendChild(avatar);
    div.appendChild(bubble);
    chat.appendChild(div);
    scrollToBottom();
    return div;
  }

  function appendTyping() {
    const chat = document.getElementById('chat-area');
    const div = document.createElement('div');
    div.className = 'message ai';

    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = '⚡';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.innerHTML = `<div class="typing-dots"><span></span><span></span><span></span></div>`;

    div.appendChild(avatar);
    div.appendChild(bubble);
    chat.appendChild(div);
    scrollToBottom();
    return div;
  }

  function formatMessage(text) {
    // ✅ FIX 1: Render gambar markdown dulu
    text = text.replace(/!\[([^\]]*)\]\((https?:\/\/[^\)]+)\)/g,
      '<img src="$2" alt="$1" style="max-width:100%;border-radius:10px;margin:8px 0;border:1px solid var(--border);">');

    // Render link markdown [text](url)
    text = text.replace(/\[([^\]]+)\]\((https?:\/\/[^\)]+)\)/g,
      '<a href="$2" target="_blank" rel="noopener">$1</a>');

    // Code blocks
    text = text.replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) => {
      return `<pre><code>${escapeHtml(code.trim())}</code></pre>`;
    });

    // Inline code
    text = text.replace(/`([^`]+)`/g, '<code>$1</code>');

    // Bold
    text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');

    // ✅ FIX 2: Negative lookbehind — jangan ubah URL yang sudah ada di dalam atribut src/href
    text = text.replace(/(?<![="'])(https?:\/\/[^\s<"']+)/g,
      '<a href="$1" target="_blank" rel="noopener">$1</a>');

    // Line breaks
    text = text.replace(/\n/g, '<br>');

    return text;
  }

  function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function scrollToBottom() {
    const chat = document.getElementById('chat-area');
    chat.scrollTop = chat.scrollHeight;
  }

  function clearChat() {
    if (messages.length === 0) return;
    if (!confirm('Hapus semua percakapan?')) return;
    messages = [];
    const chat = document.getElementById('chat-area');
    chat.innerHTML = `
      <div id="welcome">
        <div class="welcome-orb">⚡</div>
        <h1>Halo! Saya ZidanBot</h1>
        <p>Asisten khusus microcontroller. Tanya seputar Arduino, ESP32, sensor, dan elektronika!</p>
        <div class="suggestions">
          <div class="suggestion-chip" onclick="sendSuggestion('Cara blink LED dengan Arduino')">💡 Blink LED Arduino</div>
          <div class="suggestion-chip" onclick="sendSuggestion('Tampilkan pinout Arduino Uno')">📌 Pinout Arduino</div>
          <div class="suggestion-chip" onclick="sendSuggestion('Cara koneksi ESP32 ke WiFi')">📶 ESP32 WiFi</div>
          <div class="suggestion-chip" onclick="sendSuggestion('Cara pakai sensor DHT22 dengan Arduino')">🌡️ Sensor DHT22</div>
        </div>
      </div>`;
  }

  function showError(msg) {
    const toast = document.getElementById('error-toast');
    toast.textContent = msg;
    toast.style.display = 'block';
    setTimeout(() => { toast.style.display = 'none'; }, 5000);
  }
</script>
</body>
</html>
